<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="dew" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#E0FFFF;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#87CEEB;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="drop" cx="50%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#87CEEB;stop-opacity:0.3"/>
    </radialGradient>
  </defs>
  <path d="M200 60 Q200 100 200 140 Q170 180 200 200 Q230 180 200 140 Q200 100 200 60" fill="url(#dew)" opacity="0.8">
    <animate attributeName="d" values="M200 60 Q200 100 200 140 Q170 180 200 200 Q230 180 200 140 Q200 100 200 60;M200 50 Q200 90 200 130 Q165 175 200 200 Q235 175 200 130 Q200 90 200 50;M200 60 Q200 100 200 140 Q170 180 200 200 Q230 180 200 140 Q200 100 200 60" dur="3s" repeatCount="indefinite"/>
  </path>
  <ellipse cx="200" cy="160" rx="25" ry="35" fill="url(#drop)" opacity="0.9">
    <animate attributeName="ry" values="35;45;35" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <circle cx="200" cy="210" r="15" fill="#87CEEB" opacity="0.3">
    <animate attributeName="r" values="15;25;15" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="210" r="8" fill="#4682B4" opacity="0.2">
