<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="shield" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#FFA500;stop-opacity:0.5"/>
      <stop offset="80%" style="stop-color:#FF6347;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#FF6347;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <circle cx="200" cy="150" r="80" fill="url(#shield)"/>
  <circle cx="200" cy="150" r="80" fill="none" stroke="#FFD700" stroke-width="3" opacity="0.8">
    <animate attributeName="r" values="80;90;80" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="150" r="60" fill="none" stroke="#FFA500" stroke-width="2" opacity="0.6">
    <animate attributeName="r" values="60;70;60" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="150" r="40" fill="none" stroke="#FF8C00" stroke-width="1.5" opacity="0.4">
    <animate attributeName="r" values="40;50;40" dur="3.5s" repeatCount="indefinite"/>
  </circle>
</svg>