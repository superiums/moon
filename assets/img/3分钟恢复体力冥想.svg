<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <circle cx="200" cy="160" r="70" fill="url(#glow)"/>
  <circle cx="200" cy="160" r="55" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.7">
    <animate attributeName="r" values="55;65;55" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="160" r="40" fill="none" stroke="#FFA500" stroke-width="1.5" opacity="0.5">
    <animate attributeName="r" values="40;50;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="160" r="25" fill="none" stroke="#FF8C00" stroke-width="1" opacity="0.4">
    <animate attributeName="r" values="25;35;25" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>