<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="amitabha" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFAF0;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#FFD700;stop-opacity:0.7"/>
      <stop offset="60%" style="stop-color:#FF8C00;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <circle cx="200" cy="150" r="110" fill="url(#amitabha)">
    <animate attributeName="r" values="110;120;110" dur="5s" repeatCount="indefinite"/>
  </circle>
  <ellipse cx="200" cy="150" rx="45" ry="75" fill="#FFFAF0" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.1;0.2" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <circle cx="200" cy="150" r="70" fill="none" stroke="#FFFAF0" stroke-width="2" opacity="0.8">
    <animate attributeName="r" values="70;80;70" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="150" r="50" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.6">
    <animate attributeName="r" values="50;60;50" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="150" r="30" fill="none" stroke="#FFA500" stroke-width="1" opacity="0.4">
    <animate attributeName="r" values="30;40;30" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>