<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 960 540"
  width="100%"
  height="100%"
  preserveAspectRatio="xMidYMid slice"
  style="position:fixed; inset:0; z-index:-1;"
>
  <defs>
    <!-- 天空 -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cdd8ea"/>
      <stop offset="100%" stop-color="#a9bcd3"/>
    </linearGradient>

    <!-- 水面（上接天空，下加深） -->
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a9bcd3"/>
      <stop offset="100%" stop-color="#6f8aaa"/>
    </linearGradient>

    <!-- 月光柔晕 -->
    <radialGradient id="glow" cx="50%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#f5f7fb" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a9bcd3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 天空 -->
  <rect width="960" height="540" fill="url(#sky)"/>

  <!-- 月光光晕 -->
  <circle cx="480" cy="60" r="200" fill="url(#glow)">
    <animate
      attributeName="r"
      values="200;220;200"
      dur="14s"
      repeatCount="indefinite"
    />
  </circle>

  <!-- 月亮 -->
  <circle cx="480" cy="60" r="30" fill="#f8f9fc">
    <animateTransform
      attributeName="transform"
      type="scale"
      values="1;1.02;1"
      dur="10s"
      repeatCount="indefinite"
      additive="sum"
    />
  </circle>

  <!-- 水面 -->
  <path d="
      M0 320
      Q120 300 240 320
      T480 320
      T720 320
      T960 320
      V540 H0 Z
    "
    fill="url(#water)"
  >
    <animate
      attributeName="d"
      dur="18s"
      repeatCount="indefinite"
      values="
        M0 320 Q120 300 240 320 T480 320 T720 320 T960 320 V540 H0 Z;
        M0 320 Q120 340 240 320 T480 320 T720 320 T960 320 V540 H0 Z;
        M0 320 Q120 300 240 320 T480 320 T720 320 T960 320 V540 H0 Z
      "
    />
  </path>

  <!-- 第二层水波 -->
  <path d="
      M0 350
      Q120 330 240 350
      T480 350
      T720 350
      T960 350
      V540 H0 Z
    "
    fill="url(#water)"
    opacity="0.6"
  >
    <animate
      attributeName="d"
      dur="22s"
      repeatCount="indefinite"
      values="
        M0 350 Q120 330 240 350 T480 350 T720 350 T960 350 V540 H0 Z;
        M0 350 Q120 370 240 350 T480 350 T720 350 T960 350 V540 H0 Z;
        M0 350 Q120 330 240 350 T480 350 T720 350 T960 350 V540 H0 Z
      "
    />
  </path>

  <!-- 月亮倒影 -->
  <ellipse cx="480" cy="390" rx="20" ry="6" fill="#f5f7fb" opacity="0.4">
    <animate
      attributeName="ry"
      values="6;10;6"
      dur="10s"
      repeatCount="indefinite"
    />
    <animate
      attributeName="opacity"
      values="0.4;0.55;0.4"
      dur="10s"
      repeatCount="indefinite"
    />
  </ellipse>
</svg>
