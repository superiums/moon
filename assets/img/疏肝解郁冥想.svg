<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="liver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#228B22;stop-opacity:0.7"/>
      <stop offset="50%" style="stop-color:#32CD32;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#90EE90;stop-opacity:0.1"/>
    </linearGradient>
    <radialGradient id="calm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#98FB98;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <ellipse cx="200" cy="150" rx="90" ry="65" fill="url(#liver)">
    <animate attributeName="rx" values="90;100;90" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="65;75;65" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <circle cx="200" cy="150" r="40" fill="url(#calm)">
    <animate attributeName="r" values="40;50;40" dur="3s" repeatCount="indefinite"/>
  </circle>
  <path d="M150 150 Q200 100 250 150" stroke="#90EE90" stroke-width="2" fill="none" opacity="0.7">
    <animate attributeName="d" values="M150 150 Q200 100 250 150;M150 160 Q200 110 250 160;M150 150 Q200 100 250 150" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M130 180 Q200 130 270 180" stroke="#32CD32" stroke-width="1.5" fill="none" opacity="0.5">
    <animate attributeName="d" values="M130 180 Q200 130 270 180;M130 190 Q200 140 270 190;M130 180 Q200 130 270 180" dur="3.5s" repeatCount="indefinite"/>
  </path>
</svg>